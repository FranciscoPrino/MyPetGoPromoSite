<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Backoffice - Utilizadores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-success">

<div class="container-fluid">

<span class="navbar-brand">👤 Backoffice - Utilizadores</span>

<button class="btn btn-outline-light"
data-bs-toggle="offcanvas"
data-bs-target="#menu">
Menu
</button>

</div>

</nav>

<!-- OFFCANVAS MENU -->

<div class="offcanvas offcanvas-start" id="menu">

<div class="offcanvas-header">

<h5 class="offcanvas-title">Menu Backoffice</h5>

<button class="btn-close" data-bs-dismiss="offcanvas"></button>

</div>

<div class="offcanvas-body">

<ul class="list-group mb-3">

<a href="backoffice.html"
class="list-group-item list-group-item-action">
📋 Pedidos
</a>

<a href="animais.html"
class="list-group-item list-group-item-action">
🐕 Animais
</a>

<a href="utilizadores.html"
class="list-group-item list-group-item-action active">
👤 Utilizadores
</a>

<a href="Estatísticas.html"
class="list-group-item list-group-item-action">
📊 Estatísticas
</a>

</ul>

<a href="login.html"
class="btn btn-danger w-100">
Terminar sessão
</a>

</div>

</div>

<!-- CONTEÚDO -->

<div class="container py-4">

<h3 class="mb-4">📋 Gestão de Utilizadores</h3>

<ul class="nav nav-tabs mb-3">

<li class="nav-item">
<button class="nav-link active"
data-bs-toggle="tab"
data-bs-target="#inserir">
➕ Inserir Utilizador
</button>
</li>

<li class="nav-item">
<button class="nav-link"
data-bs-toggle="tab"
data-bs-target="#consultas">
🔎 Consultas
</button>
</li>

</ul>

<div class="tab-content">

<div class="tab-pane fade show active" id="inserir">

<div class="card shadow">

<div class="card-body text-center">

<button class="btn btn-success"
data-bs-toggle="modal"
data-bs-target="#clienteModal"
onclick="modoInserir()">

➕ Inserir Utilizador

</button>

</div>

</div>

</div>

<div class="tab-pane fade" id="consultas">

<div class="card shadow">

<div class="card-body">

<div class="row mb-3">

<div class="col-md-3">

<label class="form-label">Filtrar Estado</label>

<select id="filtroEstado"
class="form-select"
onchange="aplicarFiltro()">

<option value="Todos">Todos</option>
<option value="Ativo">Ativo</option>
<option value="Inativo">Inativo</option>

</select>

</div>

<div class="col-md-3">

<label class="form-label">Filtrar Tipo</label>

<select id="filtroTipo"
class="form-select"
onchange="aplicarFiltro()">

<option value="Todos">Todos</option>
<option value="Candidato">Candidato</option>
<option value="Cuidador">Cuidador</option>

</select>

</div>

<div class="col-md-6">

<label class="form-label">Pesquisar</label>

<div class="input-group">

<input type="text"
id="campoPesquisa"
class="form-control"
placeholder="Nome ou email..."
onkeyup="aplicarFiltro()">

<button class="btn btn-success"
onclick="aplicarFiltro()">
Pesquisar
</button>

</div>

</div>

</div>

<table class="table table-hover align-middle">

<thead class="table-success">

<tr>
<th>Nome</th>
<th>Email</th>
<th>Tipo</th>
<th>Estado</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tabelaClientes"></tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<!-- MODAL -->

<div class="modal fade" id="clienteModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header bg-success text-white">

<h5 class="modal-title" id="tituloModal">
Inserir Utilizador
</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<form id="formCliente">

<input type="hidden" id="linhaEditando">

<div class="mb-3">
<label class="form-label">Nome</label>
<input type="text" id="nomeCliente" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" id="emailCliente" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Tipo</label>
<select id="tipoCliente" class="form-select">
<option>Candidato</option>
<option>Cuidador</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Estado</label>
<select id="estadoCliente" class="form-select">
<option>Ativo</option>
<option>Inativo</option>
</select>
</div>

</form>

</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">
Cancelar
</button>

<button class="btn btn-success" onclick="guardarCliente()">
Guardar
</button>

</div>

</div>

</div>

</div>

<!-- TOAST SUCESSO -->

<div class="position-fixed bottom-0 end-0 p-3">

<div id="toastMensagem" class="toast text-white bg-success border-0">

<div class="d-flex">

<div class="toast-body" id="toastTexto"></div>

<button class="btn-close btn-close-white me-2 m-auto"
data-bs-dismiss="toast"></button>

</div>

</div>

</div>

<!-- TOAST CONFIRMAR ELIMINAR -->

<div class="position-fixed bottom-0 start-0 p-3">

<div id="toastConfirmar" class="toast bg-danger text-white border-0">

<div class="toast-body">

<div>Deseja eliminar este utilizador?</div>

<div class="mt-2 pt-2 border-top">

<button class="btn btn-light btn-sm"
onclick="confirmarEliminar()">
Sim
</button>

<button class="btn btn-secondary btn-sm"
data-bs-dismiss="toast">
Não
</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

let linhaSelecionada=null;

function mostrarToast(msg){

document.getElementById("toastTexto").innerText=msg;

new bootstrap.Toast(
document.getElementById("toastMensagem")
).show();

}

function modoInserir(){

document.getElementById("tituloModal").innerText="Inserir Utilizador";

document.getElementById("formCliente").reset();

document.getElementById("linhaEditando").value="";

}

function guardarCliente(){

let nome=document.getElementById("nomeCliente").value;
let email=document.getElementById("emailCliente").value;
let tipo=document.getElementById("tipoCliente").value;
let estado=document.getElementById("estadoCliente").value;

let linhaEditando=document.getElementById("linhaEditando").value;

if(linhaEditando===""){

let novaLinha=criarLinha(nome,email,tipo,estado);

document.getElementById("tabelaClientes").innerHTML+=novaLinha;

mostrarToast("Utilizador inserido com sucesso");

}else{

let linha=document.getElementById(linhaEditando);

linha.children[0].innerText=nome;
linha.children[1].innerText=email;
linha.children[2].innerHTML=badgeTipo(tipo);
linha.children[3].innerHTML=badgeEstado(estado);

mostrarToast("Utilizador atualizado");

}

bootstrap.Modal.getInstance(
document.getElementById("clienteModal")
).hide();

}

function criarLinha(nome,email,tipo,estado){

let id="linha"+Date.now();

return `
<tr id="${id}">
<td>${nome}</td>
<td>${email}</td>
<td>${badgeTipo(tipo)}</td>
<td>${badgeEstado(estado)}</td>
<td>

<button class="btn btn-primary btn-sm"
onclick="editarCliente('${id}')">
Editar
</button>

<button class="btn btn-danger btn-sm"
onclick="toastEliminar('${id}')">
Eliminar
</button>

</td>
</tr>
`;

}

function badgeTipo(tipo){

let cor=tipo==="Candidato"?"primary":"warning";

return `<span class="badge bg-${cor}">${tipo}</span>`;

}

function badgeEstado(estado){

let cor=estado==="Ativo"?"success":"secondary";

return `<span class="badge bg-${cor}">${estado}</span>`;

}

function editarCliente(id){

let linha=document.getElementById(id);

document.getElementById("nomeCliente").value=linha.children[0].innerText;
document.getElementById("emailCliente").value=linha.children[1].innerText;
document.getElementById("tipoCliente").value=linha.children[2].innerText;
document.getElementById("estadoCliente").value=linha.children[3].innerText;

document.getElementById("linhaEditando").value=id;

document.getElementById("tituloModal").innerText="Editar Utilizador";

new bootstrap.Modal(
document.getElementById("clienteModal")
).show();

}

function toastEliminar(id){

linhaSelecionada=id;

new bootstrap.Toast(
document.getElementById("toastConfirmar")
).show();

}

function confirmarEliminar(){

document.getElementById(linhaSelecionada).remove();

bootstrap.Toast.getInstance(
document.getElementById("toastConfirmar")
).hide();

mostrarToast("Utilizador eliminado com sucesso");

}

function aplicarFiltro(){

let pesquisa=document.getElementById("campoPesquisa").value.toLowerCase();

let estadoFiltro=document.getElementById("filtroEstado").value;

let tipoFiltro=document.getElementById("filtroTipo").value;

let linhas=document.querySelectorAll("#tabelaClientes tr");

linhas.forEach(linha=>{

let nome=linha.children[0].innerText.toLowerCase();
let email=linha.children[1].innerText.toLowerCase();
let tipo=linha.children[2].innerText;
let estado=linha.children[3].innerText;

let okPesquisa=
nome.includes(pesquisa)||email.includes(pesquisa);

let okEstado=
estadoFiltro==="Todos"||estado===estadoFiltro;

let okTipo=
tipoFiltro==="Todos"||tipo===tipoFiltro;

linha.style.display=(okPesquisa&&okEstado&&okTipo)
?"":"none";

});

}

</script>

</body>
</html>
